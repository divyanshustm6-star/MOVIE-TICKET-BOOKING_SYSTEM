spring.application.name=moviebooking

# Datasource: prefer DB_URL env var; fallback to in-memory H2 for local/dev
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=${HIBERNATE_DIALECT}

# Enable H2 console when using H2 (not used by default)
spring.h2.console.enabled=true

# Logging to help debug SQL and parameter bindings
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.movie.moviebooking=DEBUG

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=86400
app.jwt.issuer=moviebooking
app.cors.allowed-origins=http://localhost:5173

server.port=${PORT:9090}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
